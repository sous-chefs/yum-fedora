---
driver:
  name: dokken
  privileged: true
  chef_version: <%= ENV['CHEF_VERSION'] || 'current' %>

transport: { name: dokken }

provisioner:
  name: dokken
  multiple_converge: 2
  enforce_idempotency: true

platforms:
  - name: fedora-latest
    driver:
      image: dokken/fedora-latest
      pid_one_command: /usr/lib/systemd/systemd
