---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  deprecations_as_errors: true
  chef_license: accept
  multiple_converge: 2
  enforce_idempotency: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: fedora-latest

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  enable_all: &enable_all_run_list
    - recipe[test::enable_all]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  enable_all: &enable_all_verifier
    inspec_tests:
      - path: test/integration/enable-all

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: enable-all
    run_list: *enable_all_run_list
    verifier: *enable_all_verifier
