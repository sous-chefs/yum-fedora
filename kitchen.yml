---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  policyfile_path: Policyfile.rb
  product_name: chef
  product_version: latest
  channel: stable
  deprecations_as_errors: true
  chef_license: accept
  multiple_converge: 2
  enforce_idempotency: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: fedora-latest

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  enable_all: &enable_all_verifier
    inspec_tests:
      - path: test/integration/enable-all

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier: *default_verifier

  - name: enable-all
    provisioner:
      named_run_list: enable_all
    verifier: *enable_all_verifier
